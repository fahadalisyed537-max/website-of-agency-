<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --bg-card: #18181b;
    --bg-card-hover: #1e1e22;
    --surface: #27272a;
    --fg: #fafafa;

    --muted: #71717a;
    --border: #27272a;
    --border-light: #3f3f46;
    --accent: #3b82f6;
    --accent-bright: #60a5fa;
    --gradient-start: #3b82f6;
    --gradient-end: #a855f7;

  html { scroll-behavior: smooth; }

    html { scroll-behavior: auto; }

      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;

  @media (max-width: 768px) { .container { padding: 0 16px; } }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; border-radius: 12px; font-weight: 600;
    font-size: 15px; color: #fff; cursor: pointer; border: none;
    background: var(--accent);
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    text-decoration: none;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(59,130,246,0.35);
    background: #2563eb;
  }
  .btn-primary:focus-visible {
    outline: 2px solid var(--accent-bright);
    outline-offset: 2px;
  }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; border-radius: 12px; font-weight: 600;
    font-size: 15px; color: var(--fg); cursor: pointer;

    background: rgba(255,255,255,0.04);

    outline-offset: 2px;
  }

    padding: 28px;

  .footer-link {

    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }
  .footer-link:hover { color: var(--fg); }
  .footer-link:focus-visible {

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { motion, useInView, AnimatePresence } = window.Motion || {};

const fadeUp = {
  hidden: { opacity: 0, y: 30 },
  visible: { opacity: 1, y: 0, transition: { duration: 0.6, ease: [0.22, 1, 0.36, 1] } }
};
const stagger = { visible: { transition: { staggerChildren: 0.08 } } };

function Section({ children, className = '', id, 'data-od-id': odId }) {
  const ref = useRef(null);
  const isInView = useInView ? useInView(ref, { once: true, margin: '-80px' }) : true;
  return (
    <motion.section
      ref={ref}
      id={id}
      data-od-id={odId}
      initial="hidden"
      animate={isInView ? 'visible' : 'hidden'}
      variants={stagger}
      className={`section-padding ${className}`}
    >
      {children}
    </motion.section>
  );
}

function FadeUp({ children, className = '', delay = 0 }) {
  return (
    <motion.div variants={fadeUp} custom={delay} className={className}>
      {children}
    </motion.div>
  );
}

const navLinks = [
  { label: 'Services', href: '#services' },
  { label: 'How It Works', href: '#how-it-works' },
  { label: 'Benefits', href: '#benefits' },
  { label: 'FAQ', href: '#faq' },
];

function Navbar() {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <motion.nav
      initial={{ y: -100 }}
      animate={{ y: 0 }}
      transition={{ duration: 0.5, ease: [0.22, 1, 0.36, 1] }}
      className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'glass' : ''}`}
      style={{ borderBottom: scrolled ? '1px solid rgba(255,255,255,0.06)' : '1px solid transparent' }}
    >
      <div className="container" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 72 }}>
        <a href="#" style={{ display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none', color: 'var(--fg)' }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: 'linear-gradient(135deg, var(--gradient-start), var(--gradient-end))', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </div>
          <span style={{ fontWeight: 700, fontSize: 17, letterSpacing: '-0.02em' }}>Open Automations</span>
        </a>
        <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
          <div className="nav-links-desktop" style={{ display: 'flex', gap: 28 }}>
            {navLinks.map(l => (
              <a key={l.href} href={l.href} className="nav-link">{l.label}</a>
            ))}
          </div>
          <a href="#cta" className="btn-primary" style={{ padding: '10px 20px', fontSize: 14 }}>Book a Call</a>
          <button onClick={() => setMobileOpen(!mobileOpen)} className="mobile-menu-btn"
            style={{ display: 'none', background: 'none', border: 'none', color: 'var(--fg)', cursor: 'pointer', padding: 4 }}
            aria-label="Toggle menu">
            {mobileOpen ? <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
              : <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12h18"/><path d="M3 6h18"/><path d="M3 18h18"/></svg>}
          </button>
        </div>
      </div>
      <AnimatePresence>
        {mobileOpen && (
          <motion.div
            initial={{ height: 0, opacity: 0 }}
            animate={{ height: 'auto', opacity: 1 }}
            exit={{ height: 0, opacity: 0 }}
            className="glass"
            style={{ overflow: 'hidden', borderTop: '1px solid rgba(255,255,255,0.06)' }}
          >
            <div style={{ padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 12 }}>
              {navLinks.map(l => (
                <a key={l.href} href={l.href} onClick={() => setMobileOpen(false)}
                  style={{ color: 'var(--fg-2)', textDecoration: 'none', fontSize: 16, fontWeight: 500, padding: '8px 0' }}>{l.label}</a>
              ))}
              <a href="#cta" className="btn-primary" style={{ textAlign: 'center', marginTop: 8 }} onClick={() => setMobileOpen(false)}>Book a Call</a>
            </div>
          </motion.div>
        )}
      </AnimatePresence>
      <style>{`
        @media (max-width: 768px) {
          .nav-links-desktop { display: none !important; }
          .mobile-menu-btn { display: block !important; }
        }
      `}</style>
    </motion.nav>
  );
}

function Hero() {

      <div className="container" style={{ textAlign: 'center', position: 'relative', zIndex: 1 }}>

            <a href="#how-it-works" className="btn-secondary" style={{ padding: '16px 32px', fontSize: 16 }}>
              See How It Works
            </a>
          </div>
        </FadeUp>
      </div>
    </Section>
  );
}

const stats = [

                    {p.icon === 'users' && <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}

function Services() {

    <Section id="services" data-od-id="services-section">
      <div className="container">
        <FadeUp>
          <p className="tag" style={{ marginBottom: 16 }}>Services</p>
